<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" fill="#0A0A0A"/>
  <!-- Subtle border -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.3"/>
  <!-- Letter I - simple vertical bar -->
  <rect x="16" y="18" width="6" height="28" rx="1" fill="url(#g)"/>
  <!-- Letter L - vertical bar + horizontal bar -->
  <rect x="30" y="18" width="6" height="28" rx="1" fill="url(#g)"/>
  <rect x="30" y="40" width="18" height="6" rx="1" fill="url(#g)"/>
</svg>
